name: Auto PR from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse issue body and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          # ── Parse structured fields from the issue body ──
          parse_field() {
            local label="$1"
            echo "$ISSUE_BODY" | awk -v label="### $label" '
              $0 == label { found=1; next }
              found && /^[[:space:]]*$/ { next }
              found && /^### / { exit }
              found { print; exit }
            ' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
          }

          parse_multiline_field() {
            local label="$1"
            echo "$ISSUE_BODY" | awk -v label="### $label" '
              $0 == label { found=1; next }
              found && !started && /^[[:space:]]*$/ { next }
              found && /^### / { exit }
              found { started=1; print }
            ' | sed 's/[[:space:]]*$//'
          }

          CATEGORY=$(parse_field "Category")
          TITLE=$(parse_field "Resource Title")
          DESCRIPTION=$(parse_field "Description")
          PROMPT=$(parse_multiline_field "Prompt Text (if submitting a prompt)")
          PREVIEW_RAW=$(parse_multiline_field "Preview Image")

          echo "Category:    $CATEGORY"
          echo "Title:       $TITLE"
          echo "Description: $DESCRIPTION"
          echo "Prompt:      $PROMPT"
          echo "Preview raw: $PREVIEW_RAW"

          # ── Only proceed for Prompts categories ──
          if [[ ! "$CATEGORY" =~ ^Prompts: ]]; then
            echo "Category '$CATEGORY' does not start with 'Prompts:'. Skipping."
            exit 0
          fi

          # ── Map category to slug and README section ──
          case "$CATEGORY" in
            "Prompts: Marketing & Public") CAT_SLUG="marketing"; README_SECTION="## Prompts: Marketing and Public" ;;
            "Prompts: Product & App")      CAT_SLUG="product";   README_SECTION="## Prompts: Product and App" ;;
            "Prompts: Commerce")           CAT_SLUG="commerce";  README_SECTION="## Prompts: Commerce" ;;
            "Prompts: Utility")            CAT_SLUG="utility";   README_SECTION="## Prompts: Utility" ;;
            "Prompts: Admin")              CAT_SLUG="admin";     README_SECTION="## Prompts: Admin" ;;
            *)
              echo "Unknown Prompts category: $CATEGORY"
              exit 1
              ;;
          esac

          # ── Generate slug from title (lowercase, hyphens, no special chars) ──
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          echo "Slug: $SLUG"

          # ── Download preview image if present ──
          IMAGE_PATH=""
          if echo "$PREVIEW_RAW" | grep -qoP 'https://[^\s\)]+\.(png|jpg|jpeg|gif|webp)'; then
            IMAGE_CDN=$(echo "$PREVIEW_RAW" | grep -oP 'https://[^\s\)]+\.(png|jpg|jpeg|gif|webp)' | head -1)
            echo "Downloading preview image: $IMAGE_CDN"
            mkdir -p "docs/previews/${CAT_SLUG}"
            IMAGE_PATH="docs/previews/${CAT_SLUG}/${SLUG}.png"
            curl -fsSL -o "$IMAGE_PATH" "$IMAGE_CDN"
            echo "Image saved to: $IMAGE_PATH"
          else
            echo "No preview image found in submission."
          fi

          # ── Add entry to README.md (Single Source of Truth) ──
          # Find the last list item in the category section and append after it
          README_LINE="- [${TITLE}](https://tygwan.github.io/awesome-stitch-design/#${SLUG}) - ${DESCRIPTION}."

          python3 << PYEOF
          import re

          with open('README.md', 'r') as f:
              lines = f.readlines()

          section = "$README_SECTION"
          new_line = "$README_LINE\n"

          # Find the section and insert before the next ## section
          in_section = False
          last_list_idx = -1

          for i, line in enumerate(lines):
              if line.strip() == section:
                  in_section = True
                  continue
              if in_section and line.startswith('## ') and not line.startswith('### '):
                  break
              if in_section and line.startswith('- ['):
                  last_list_idx = i

          if last_list_idx >= 0:
              lines.insert(last_list_idx + 1, new_line)
          else:
              print("WARNING: Could not find insertion point in README.md")
              exit(1)

          with open('README.md', 'w') as f:
              f.writelines(lines)

          print(f"Added entry to README.md after line {last_list_idx + 1}")
          PYEOF

          # ── Add metadata entry if prompt text provided ──
          if [ -n "$PROMPT" ]; then
            python3 << METAEOF
          import json

          slug = "$SLUG"
          prompt = """$PROMPT"""
          author = "$ISSUE_AUTHOR"
          cat = "$CAT_SLUG"

          meta_path = 'docs/data/metadata.json'
          with open(meta_path, 'r') as f:
              metadata = json.load(f)

          metadata[slug] = {
              'prompt': prompt.strip(),
              'device': 'Desktop',
              'featured': False,
              'discussionNumber': None,
              'contributor': author
          }

          with open(meta_path, 'w') as f:
              json.dump(metadata, f, indent=2, ensure_ascii=False)
              f.write('\n')

          print(f"Added metadata for {slug}")
          METAEOF
          fi

          # ── Create branch and commit ──
          BRANCH="add-prompt/${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          git add README.md
          if [ -n "$IMAGE_PATH" ]; then
            git add "$IMAGE_PATH"
          fi
          if [ -n "$PROMPT" ]; then
            git add docs/data/metadata.json
          fi

          git commit -m "Add prompt: ${TITLE}

          Auto-generated from #${ISSUE_NUMBER}
          Submitted by @${ISSUE_AUTHOR}"

          git push origin "$BRANCH"

          # ── Create pull request ──
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Add prompt: ${TITLE}" \
            --body "Auto-generated from #${ISSUE_NUMBER}

          Submitted by @${ISSUE_AUTHOR}

          ${DESCRIPTION}

          ---
          _Once merged, \`parse-readme.yml\` will auto-regenerate \`prompts.json\` from README._" \
            --label "auto-pr")

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          echo "PR created: $PR_URL (number: $PR_NUMBER)"

          # ── Comment on the original issue ──
          gh issue comment "$ISSUE_NUMBER" \
            --body "PR #${PR_NUMBER} has been automatically created. A maintainer will review and merge it."
