name: Parse README to prompts.json

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/data/metadata.json'
      - 'scripts/build-prompts.py'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build prompts.json from README
        run: python3 scripts/build-prompts.py

      - name: Check for changes and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet docs/data/prompts.json; then
            echo "No changes to prompts.json"
            exit 0
          fi

          git add docs/data/prompts.json
          git commit -m "chore: rebuild prompts.json from README"
          git push
